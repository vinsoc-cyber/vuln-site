version: "3.9"

services:

  # cloudflared:
  #   image: cloudflare/cloudflared
  #   container_name: cloudflare-tunnel
  #   restart: unless-stopped
  #   command: tunnel --no-autoupdate run
  #   environment:
  #     - TUNNEL_TOKEN=$TUNNEL_TOKEN
  #   networks:
  #     - cloudflared

  sqli:
    build:
      context: .
    command: [ "python", "vuln/sqli/vuln_sqli.py" ]
    ports:
      - "1111:1111"
    read_only: true
    tmpfs:
      - /tmp
      - /var/tmp
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    init: true
    restart: unless-stopped
    networks:
      - cloudflared

  xss:
    build:
      context: .
    command: [ "python", "vuln/xss/vuln_xss.py" ]
    ports:
      - "1112:1112"
    read_only: true
    tmpfs:
      - /tmp
      - /var/tmp
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    init: true
    restart: unless-stopped
    networks:
      - cloudflared

  ssti:
    build:
      context: .
    command: [ "python", "vuln/ssti/vuln_ssti.py" ]
    ports:
      - "1113:1113"
    read_only: true
    tmpfs:
      - /tmp
      - /var/tmp
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    init: true
    restart: unless-stopped
    networks:
      - cloudflared

networks:
  cloudflared:
