{% extends "base.html" %}
{% block content %}
<div class="max-w-md mx-auto bg-slate-900 p-8 rounded border border-slate-800 shadow-2xl">
    <h2 class="text-2xl text-white mb-6 border-b border-slate-700 pb-2">Settings</h2>
    <form method="GET">
        <label class="text-cyan-600 text-sm font-bold">NAME</label>
        <input type="text" name="u" value="{{ safe_username|safe }}" class="w-full p-3 mt-1 mb-4 rounded bg-black border-cyan-900 text-white focus:border-cyan-500">

        <button class="w-full bg-cyan-700 text-white py-3 font-bold rounded hover:bg-cyan-600 transition">UPDATE</button>
    </form>
  </div>
{% endblock %}
