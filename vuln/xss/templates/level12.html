{% extends "base.html" %}
{% block content %}
<div class="max-w-2xl mx-auto">
    <h2 class="text-2xl text-cyan-400 mb-4">Guestbook Sanitizer</h2>
    <form method="POST" class="mb-6">
        <textarea name="comment" class="w-full p-3 h-28 bg-slate-900 border-cyan-700" placeholder="Leave a formatted message..."></textarea>
        <button class="mt-3 bg-cyan-600 text-white px-6 py-2 font-bold w-full">POST</button>
    </form>

    {% if message %}
    <div class="text-cyan-300 text-sm mb-4">{{ message }}</div>
    {% endif %}

    <div class="space-y-3">
        {% for entry in entries %}
        <div class="p-3 bg-slate-900/50 border border-cyan-900/40 text-white">{{ entry[0]|safe }}</div>
        {% endfor %}
    </div>
</div>
{% endblock %}
