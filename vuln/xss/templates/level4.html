{% extends "base.html" %}
{% block content %}
<form method="GET" class="max-w-2xl mx-auto">
    <div class="mb-2 flex justify-between">
        <label class="text-cyan-300 font-bold">FILTER: <span class="text-green-400">ENABLED</span></label>
        <span class="text-xs text-slate-500">Content filter active</span>
    </div>
    <div class="flex gap-2">
        <input type="text" name="q" value="{{ query|safe }}" class="w-full p-3 rounded bg-slate-900 border-slate-700" placeholder="Enter input...">
        <button class="bg-blue-700 px-6 py-2 text-white font-bold rounded hover:bg-blue-600">PROCESS</button>
    </div>
</form>
<div class="mt-10 p-6 border border-slate-700 bg-slate-900/50 rounded text-center">
    <div class="text-slate-500 text-xs uppercase mb-2">Output</div>
    <div class="text-xl">{{ safe_query|safe }}</div>
</div>
{% endblock %}
