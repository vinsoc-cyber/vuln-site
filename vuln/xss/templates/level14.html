{% extends "base.html" %}
{% block content %}
<div class="max-w-2xl mx-auto">
    <h2 class="text-2xl text-cyan-400 mb-4">Template Literal</h2>
    <form method="GET" class="flex gap-2 mb-6">
        <input name="name" value="{{ name }}" class="flex-1 p-2 bg-slate-900 border-cyan-700" placeholder="Operator name">
        <button class="bg-cyan-600 text-white px-6 font-bold">RENDER</button>
    </form>

    <div id="banner" class="text-3xl text-white font-bold"></div>
</div>

<script>
    var banner = `Welcome ${name}`;
    document.getElementById('banner').innerHTML = banner;
</script>
{% endblock %}
