{% extends "base.html" %}
{% block content %}
<div class="max-w-3xl mx-auto">
    <h2 class="text-2xl text-red-400 mb-4">Dotless Vault</h2>
    <form method="POST" class="mb-6">
        <input name="expr" value="{{ expr }}" class="w-full p-3 bg-slate-900 border-red-800 font-mono" placeholder="{&#123; vault|attr('flag') &#125;}">
        <button class="mt-3 bg-red-700 hover:bg-red-600 px-8 py-3 text-white font-bold w-full">EVALUATE</button>
    </form>

    {% if rendered_output %}
    <div class="bg-black/50 border border-red-900 p-6 rounded-lg">
        <div class="text-red-600 text-xs font-mono mb-3">// OUTPUT</div>
        <div class="text-white">{{ rendered_output }}</div>
    </div>
    {% endif %}

    {% if success_detected %}
    <div class="mt-6 p-4 border-2 border-green-500 bg-green-900/30 text-green-400 font-bold text-xl animate-pulse">
        CONGRATULATIONS! Attribute access via filter succeeded.
    </div>
    {% endif %}
</div>
{% endblock %}
