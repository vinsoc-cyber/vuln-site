{% extends "base.html" %}
{% block content %}
<div class="text-center py-10">
    <div class="mb-8">
        <div class="inline-block p-6 border-2 border-red-500/30 rounded-full mb-4">
            <svg class="w-12 h-12 text-red-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"></path></svg>
        </div>
        <h2 class="text-3xl text-white font-light mb-2">Context Hijack</h2>
        <p class="text-slate-400">Dynamic variable lookup from the template context</p>
    </div>

    <form method="GET" class="max-w-lg mx-auto space-y-4">
        <div>
            <input name="user" value="{{ username }}" class="w-full p-3 bg-slate-900 border-red-800 text-center" placeholder="Username">
        </div>
        <div>
            <input name="type" value="{{ greeting_type }}" class="w-full p-3 bg-slate-900 border-red-800 text-center font-mono text-sm" placeholder="user">
        </div>
        <button class="bg-red-700 hover:bg-red-600 px-8 py-3 text-white font-bold w-full">GENERATE</button>
    </form>

    {% if output and not output.startswith('Error') %}
    <div class="mt-10 p-8 bg-red-950/20 border border-red-800 rounded-lg">
        <div class="text-4xl text-white font-light">{{ output }}</div>
    </div>
    {% endif %}

    {% if success_detected %}
    <div class="mt-6 p-4 border-2 border-green-500 bg-green-900/30 text-green-400 font-bold text-xl animate-pulse">
        CONGRATULATIONS! Variable hijacking successful!
    </div>
    {% endif %}
</div>
{% endblock %}
