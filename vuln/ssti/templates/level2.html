{% extends "base.html" %}
{% block content %}
<div class="text-center">
    <h2 class="text-3xl mb-2 text-red-400 font-light">Expression Calculator</h2>
    <p class="text-slate-400 mb-8">Evaluate mathematical expressions</p>

    <form method="GET" class="max-w-lg mx-auto">
        <div class="mb-4">
            <label class="block text-left text-red-500 text-sm mb-2 font-bold">EXPRESSION</label>
            <div class="flex">
                <input name="expr" value="{{ expression }}" class="flex-1 p-3 bg-slate-900 border-red-800 text-red-200 font-mono text-lg" placeholder="7 * 6">
                <button class="bg-red-700 hover:bg-red-600 px-6 text-white font-bold ml-2">CALCULATE</button>
            </div>
        </div>
    </form>

    {% if result %}
    <div class="mt-10 p-8 bg-black/50 border-2 border-red-900 rounded-lg">
        <div class="text-slate-500 text-xs uppercase mb-2">Result</div>
        <div class="text-5xl text-white font-mono font-bold">{{ result }}</div>
    </div>
    {% endif %}

    {% if success_detected %}
    <div class="mt-6 p-4 border-2 border-green-500 bg-green-900/30 text-green-400 font-bold text-xl animate-pulse">
        CONGRATULATIONS! Template Injection successful - non-mathematical result!
    </div>
    {% endif %}
</div>
{% endblock %}
