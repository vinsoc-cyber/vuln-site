{% extends "base.html" %}
{% block content %}
<div class="max-w-xl mx-auto">
    <div class="flex items-center gap-3 mb-6">
        <div class="w-3 h-3 bg-red-500 rounded-full animate-pulse"></div>
        <h2 class="text-2xl text-red-400">Config Injector</h2>
    </div>

    <form method="POST" class="mb-8">
        <label class="block text-red-500 text-sm mb-2 font-bold">CONFIG KEY NAME</label>
        <div class="flex gap-2">
            <input type="text" name="config" value="{{ config_name }}" class="flex-1 p-3 bg-slate-900 border-red-800 font-mono" placeholder="app_name">
            <button class="bg-red-700 hover:bg-red-600 px-6 text-white font-bold">INJECT</button>
        </div>
    </form>

    {% if rendered_output %}
    <div class="bg-slate-950/50 border border-red-800 p-4 rounded">
        <div class="text-red-600 text-xs font-mono mb-2">// RENDERED OUTPUT</div>
        <div class="text-white font-mono">{{ rendered_output }}</div>
    </div>
    {% endif %}

    {% if success_detected %}
    <div class="mt-6 p-4 border-2 border-green-500 bg-green-900/30 text-green-400 font-bold text-xl animate-pulse">
        CONGRATULATIONS! Config accessed via Template Injection!
    </div>
    {% endif %}
</div>
{% endblock %}
