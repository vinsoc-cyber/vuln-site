{% extends "base.html" %}
{% block content %}
<form method="GET" class="flex gap-2 mb-8">
    <input type="text" name="search" value="{{ search }}" class="flex-1 p-3 bg-slate-900" placeholder="Search...">
    <button class="bg-amber-600 px-6 font-bold text-black">SCAN</button>
</form>
{% if show_flag_congrats %}
<div class="mb-4 p-4 border-2 border-green-500 bg-green-900/30 text-green-400 font-bold text-xl animate-pulse">
     CONGRATULATIONS! FLAG successfully extracted with SQL Injection! 
</div>
{% endif %}
<div class="space-y-2">
    {% for r in results %}
    <div class="p-2 border-l-2 border-amber-500 bg-slate-900/50">{{ r[0] }} :: {{ r[1] }}</div>
    {% endfor %}
</div>
{% endblock %}
