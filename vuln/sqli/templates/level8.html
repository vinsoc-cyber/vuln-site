{% extends "base.html" %}
{% block content %}
{% if step == 'register' %}
<div class="max-w-md mx-auto">
    <h3 class="text-xl mb-4 text-amber-400">Step 1: Register</h3>
    {% if error_msg %}
    <div class="text-red-500 text-center font-bold mb-4">{{ error_msg }}</div>
    {% endif %}
    <form method="POST">
        <input name="username" class="w-full p-3 mb-2 bg-slate-900 border-amber-800" placeholder="Username">
        <button class="bg-amber-600 w-full py-3 font-bold text-black">REGISTER</button>
    </form>
</div>
{% else %}
<div class="max-w-md mx-auto text-center">
    <div class="text-2xl text-white mb-2">User: {{ user }}</div>
    <div class="border-t border-amber-900 pt-2 mt-2">ROLE: <span class="text-red-400 font-bold text-xl">{{ role }}</span></div>

    {% if role == 'admin' %}
    <div class="mt-6 p-4 border-2 border-green-500 bg-green-900/30 text-green-400 font-bold text-xl animate-pulse">
        CONGRATULATIONS! You got admin role!
    </div>
    {% endif %}

    <div class="mt-6"><a href="/level8" class="text-amber-500 underline">Try again</a></div>
</div>
{% endif %}
{% endblock %}
